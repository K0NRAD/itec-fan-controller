; PlatformIO Project Configuration
; Lüftersteuerung (PWM) für ESP32 DevKitC v4 (ESP32-WROOM-32)
;
; Toolchain-Entscheidung:
;   Es wird die community-gepflegte "pioarduino"-Plattform verwendet, da diese
;   Arduino-ESP32 Core 3.x (auf Basis von ESP-IDF 5.x) unterstützt. Der offizielle
;   PlatformIO-"espressif32"-Platform deckt nur den nicht mehr gepflegten Core 2.x ab.
;   Die Version ist fest gepinnt, damit CI-Builds reproduzierbar sind.

[platformio]
default_envs = esp32devkitc-v4

[env:esp32devkitc-v4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = esp32dev
framework = arduino

; ESP32 DevKitC v4 = ESP32-WROOM-32, 4 MB Flash
board_build.flash_mode = dio
board_build.filesystem = littlefs

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

; Module unter lib/ inkludieren sich gegenseitig (z.B. FanConfig.h). Plain "deep"
; scannt alle #include-Direktiven global (ohne Präprozessor-Auswertung) und ordnet
; auch die gebündelten Framework-Header (Network.h aus der Network-Library) korrekt
; ihrer Library zu. Die "+"-Varianten scheitern hier an der Auflösung.
lib_ldf_mode = deep

build_flags =
    -D CORE_DEBUG_LEVEL=2
    -Wall
    -Wextra

; Alle Abhängigkeiten mit Caret-Range auf kompatible, gepflegte Versionen gepinnt.
lib_deps =
    ESP32Async/AsyncTCP@^3.4.0
    ESP32Async/ESPAsyncWebServer@^3.7.0
    bblanchon/ArduinoJson@^7.4.1
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^4.0.4
