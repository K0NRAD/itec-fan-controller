name: Release

on:
  push:
    branches: [main]

# Benötigt zum Erstellen von Tags und Releases.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (volle Historie für Versionsermittlung)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Nächste Version ermitteln (Conventional Commits)
        id: version
        uses: thenativeweb/get-next-version@main

      - name: Ergebnis ausgeben
        run: |
          echo "hasNextVersion=${{ steps.version.outputs.hasNextVersion }}"
          echo "version=${{ steps.version.outputs.version }}"

      - name: Python einrichten
        if: steps.version.outputs.hasNextVersion == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: PlatformIO installieren
        if: steps.version.outputs.hasNextVersion == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache (PlatformIO-Pakete)
        if: steps.version.outputs.hasNextVersion == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Firmware bauen (ESP32 DevKitC v4)
        if: steps.version.outputs.hasNextVersion == 'true'
        run: pio run -e esp32devkitc-v4

      - name: Dateisystem-Image (LittleFS) bauen
        if: steps.version.outputs.hasNextVersion == 'true'
        run: pio run -e esp32devkitc-v4 -t buildfs

      - name: Deployment-Artefakte sammeln
        if: steps.version.outputs.hasNextVersion == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Nur fuer das Deployment benoetigte Dateien (kein elf/bootloader/
          # partitions – diese sind im Factory-Image enthalten).
          BUILD_DIR=.pio/build/esp32devkitc-v4
          mkdir -p dist
          cp "$BUILD_DIR/firmware.bin" "dist/firmware-${VERSION}.bin"
          cp "$BUILD_DIR/littlefs.bin" "dist/littlefs.bin"

      - name: Kombiniertes Factory-Image erzeugen
        if: steps.version.outputs.hasNextVersion == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # esptool gepinnt fuer stabile merge_bin-Syntax (unabhaengig von der
          # mit PlatformIO gebundelten Version).
          pip install "esptool==4.8.1"

          BUILD_DIR=.pio/build/esp32devkitc-v4
          BOOT_APP0=$(find ~/.platformio/packages -name boot_app0.bin | head -n 1)
          if [ -z "$BOOT_APP0" ]; then
            echo "boot_app0.bin nicht gefunden"; exit 1
          fi

          # Ein flashbares Gesamtimage (Bootloader + Partitionstabelle + OTA-Data
          # + App + LittleFS). Offsets: klassischer ESP32, 4-MB-Default-Partition.
          python -m esptool --chip esp32 merge_bin \
            -o "dist/factory-${VERSION}.bin" \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000   "$BUILD_DIR/bootloader.bin" \
            0x8000   "$BUILD_DIR/partitions.bin" \
            0xe000   "$BOOT_APP0" \
            0x10000  "$BUILD_DIR/firmware.bin" \
            0x290000 "$BUILD_DIR/littlefs.bin"

      - name: Release-Beschreibung (Installationsanleitung) erzeugen
        if: steps.version.outputs.hasNextVersion == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Installation

          ### Neues / leeres Board (per USB)

          Das komplette Image in einem Schritt flashen (esptool erforderlich:
          `pip install esptool`):

          ```bash
          esptool --chip esp32 write_flash 0x0 factory-__VERSION__.bin
          ```

          ### Bestehendes Gerät aktualisieren (OTA, ohne Kabel)

          In der Weboberfläche unter **„Firmware-Update (OTA)"** die Datei hochladen
          (passwortgeschützt). Für OTA wird verwendet:

          - **firmware-__VERSION__.bin** – aktualisiert die **Firmware** (Standard-OTA-Datei)
          - **littlefs.bin** – aktualisiert optional das **Webinterface** (Dateisystem)

          ## Enthaltene Dateien

          | Datei | Zweck |
          | ----- | ----- |
          | `factory-__VERSION__.bin` | Erstinstallation per USB (Offset `0x0`) |
          | `firmware-__VERSION__.bin` | **OTA-Firmware-Update** bzw. USB-App-Slot (`0x10000`) |
          | `littlefs.bin` | Webinterface für OTA bzw. USB (`0x290000`) |
          EOF
          sed -i "s/__VERSION__/${VERSION}/g" RELEASE_NOTES.md

      - name: Tag erstellen und pushen
        if: steps.version.outputs.hasNextVersion == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: GitHub-Release veröffentlichen
        if: steps.version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: dist/*
